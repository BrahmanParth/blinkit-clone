<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkit Fast and reliable delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        /* Cart Sidebar Animation */
        #cart-sidebar { transition: transform 0.3s ease-in-out; }
        .cart-hidden { transform: translateX(100%); }
        .cart-show { transform: translateX(0); }

        /* Order Tracking Animations */
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .animate-progress { animation: progress 4s linear forwards; }

        @keyframes bikeMove {
            0% { transform: translateX(-15px); }
            100% { transform: translateX(15px); }
        }
        .animate-bike { animation: bikeMove 1s infinite alternate ease-in-out; }
        
        .custom-shadow { shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.07); }
    </style>
</head>
<body class="bg-[#F8F8F8]">

    <nav class="bg-white shadow-sm sticky top-0 z-40 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="text-4xl font-extrabold text-[#F7D300] tracking-tighter italic">blinkit</h1>
                <p class="text-[10px] font-black text-gray-400 tracking-widest uppercase">Delivery in 10 minutes</p>
            </div>
            
            <button onclick="toggleCart()" class="bg-[#1C853D] text-white px-6 py-3 rounded-xl font-bold flex items-center gap-3 hover:bg-[#156b30] transition-all transform active:scale-95 shadow-lg shadow-green-100">
                <span class="text-xl">🛒</span>
                <div class="text-left leading-none">
                    <p class="text-[10px] opacity-80 uppercase">My Cart</p>
                    <p class="text-sm"><span id="cart-count">0</span> Items</p>
                </div>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-extrabold text-gray-800">Dairy, Bread & Eggs</h2>
            <span class="text-green-600 font-bold text-sm bg-green-50 px-3 py-1 rounded-full border border-green-100">Store Open</span>
        </div>
        
        <div id="loading" class="text-center py-20">
            <div class="animate-spin text-4xl mb-4 inline-block text-green-600">🌀</div>
            <p class="text-gray-500 font-bold">Connecting to Java Backend...</p>
        </div>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5 lg:gap-8">
            </div>
    </main>

    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden transition-opacity"></div>
    
    <div id="cart-sidebar" class="fixed top-0 right-0 w-full max-w-sm h-full bg-white z-50 shadow-2xl cart-hidden flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50/50">
            <h2 class="text-2xl font-black text-gray-800 tracking-tight">My Cart</h2>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-black transition-colors text-3xl">&times;</button>
        </div>
        
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6">
            </div>

        <div class="p-6 border-t bg-white space-y-4">
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-[10px] font-black text-gray-400 uppercase">Grand Total</p>
                    <p id="cart-total" class="text-3xl font-black text-gray-900">₹0</p>
                </div>
                <p class="text-green-600 text-[10px] font-bold bg-green-50 px-2 py-1 rounded">FREE DELIVERY</p>
            </div>
            <button onclick="processCheckout()" class="w-full bg-[#1C853D] text-white py-5 rounded-2xl font-black text-lg hover:bg-[#156b30] shadow-xl shadow-green-100 transition-all active:scale-[0.98]">
                Proceed to Checkout
            </button>
        </div>
    </div>

    <div id="order-modal" class="fixed inset-0 bg-black/90 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-[40px] w-full max-w-md p-10 text-center relative overflow-hidden shadow-2xl">
            <div class="absolute top-0 left-0 w-full h-3 bg-[#F7D300]"></div>
            
            <div class="text-7xl mb-6 animate-bike inline-block mt-4">🚴💨</div>
            <h2 class="text-3xl font-black text-gray-900 mb-2 leading-tight">Yay! Order on its way</h2>
            <p class="text-gray-500 font-medium text-sm mb-8">Arriving at <span class="text-green-600 font-bold">Hostel - CU</span> in 10 mins</p>
            
            <div class="w-full bg-gray-100 h-4 rounded-full overflow-hidden mb-10 border border-gray-50">
                <div class="h-full bg-[#1C853D] rounded-full animate-progress"></div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center gap-5 text-left p-5 bg-gray-50 rounded-[25px] border border-gray-100">
                    <div class="bg-white p-3 rounded-2xl shadow-sm text-2xl">🏠</div>
                    <div>
                        <p class="text-[10px] text-gray-400 font-black uppercase tracking-wider">Delivery Address</p>
                        <p class="text-sm font-extrabold text-gray-700 leading-tight">Chandigarh University, Mohali</p>
                    </div>
                </div>
                
                <button onclick="closeOrderModal()" class="w-full py-4 text-gray-400 font-bold hover:text-gray-800 transition-colors">
                    Back to Home
                </button>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let cart = [];

        // 1. Fetch from Java Backend
        async function fetchProducts() {
            try {
                const response = await fetch('http://localhost:8080/blinkit/api/products');
                products = await response.json();
                document.getElementById('loading').classList.add('hidden');
                renderUI();
            } catch (error) {
                console.error("Backend Error:", error);
                document.getElementById('loading').innerHTML = `
                    <div class="bg-red-50 text-red-600 p-6 rounded-3xl border border-red-100 inline-block">
                        <p class="font-black">BACKEND OFFLINE</p>
                        <p class="text-xs">Please start your Tomcat Server in IntelliJ</p>
                    </div>`;
            }
        }

        // 2. Global Render
        function renderUI() {
            renderProductGrid();
            renderCartDrawer();
        }

        // 3. Render Product Cards
        function renderProductGrid() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => {
                const cartItem = cart.find(c => c.id === p.id);
                const qty = cartItem ? cartItem.qty : 0;

                return `
                <div class="bg-white border border-gray-100 rounded-[25px] p-4 hover:shadow-2xl hover:shadow-gray-200/50 transition-all duration-300 flex flex-col group border-b-4 border-b-transparent hover:border-b-green-500">
                    <div class="h-32 bg-gray-50 rounded-2xl mb-4 flex items-center justify-center text-gray-200 group-hover:scale-105 transition-transform duration-300">
                        <span class="text-3xl font-bold uppercase">📦</span>
                    </div>
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">${p.category}</p>
                    <h3 class="font-bold text-gray-800 text-sm mb-6 flex-1 leading-snug">${p.name}</h3>
                    
                    <div class="flex justify-between items-center mt-auto">
                        <span class="font-black text-gray-900 text-lg">₹${p.price}</span>
                        
                        <div id="btn-container-${p.id}">
                            ${qty === 0 ? 
                                `<button onclick="addToCart(${p.id})" class="bg-white text-green-700 border border-green-200 px-6 py-2 rounded-xl text-xs font-black shadow-sm hover:bg-green-600 hover:text-white hover:border-green-600 transition-all duration-200">
                                    ADD
                                </button>` 
                                : 
                                `<div class="flex items-center bg-[#1C853D] text-white rounded-xl font-black text-xs shadow-lg shadow-green-100 overflow-hidden">
                                    <button onclick="removeFromCart(${p.id})" class="px-3 py-2 hover:bg-[#156b30] transition-colors">-</button>
                                    <span class="px-2 min-w-[20px] text-center">${qty}</span>
                                    <button onclick="addToCart(${p.id})" class="px-3 py-2 hover:bg-[#156b30] transition-colors">+</button>
                                </div>`
                            }
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // 4. Render Cart Sidebar
        function renderCartDrawer() {
            const container = document.getElementById('cart-items');
            const countLabel = document.getElementById('cart-count');
            const totalLabel = document.getElementById('cart-total');

            const totalQty = cart.reduce((sum, i) => sum + i.qty, 0);
            const totalBill = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

            countLabel.innerText = totalQty;
            totalLabel.innerText = '₹' + totalBill;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center opacity-30">
                        <span class="text-8xl mb-4">🛒</span>
                        <p class="font-black text-xl text-gray-800">Your cart is <br> painfully empty</p>
                    </div>`;
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <div class="pr-4">
                        <h4 class="text-sm font-bold text-gray-800">${item.name}</h4>
                        <p class="text-xs font-black text-green-600">₹${item.price}</p>
                    </div>
                    <div class="flex items-center bg-[#1C853D] text-white rounded-xl font-black text-xs">
                        <button onclick="removeFromCart(${item.id})" class="px-3 py-2 hover:bg-[#156b30]">-</button>
                        <span class="px-2">${item.qty}</span>
                        <button onclick="addToCart(${item.id})" class="px-3 py-2 hover:bg-[#156b30]">+</button>
                    </div>
                </div>`).join('');
        }

        // Actions
        function addToCart(id) {
            const p = products.find(x => x.id === id);
            const exists = cart.find(x => x.id === id);
            if (exists) exists.qty++;
            else cart.push({ ...p, qty: 1 });
            renderUI();
        }

        function removeFromCart(id) {
            const i = cart.findIndex(x => x.id === id);
            if (cart[i].qty > 1) cart[i].qty--;
            else cart.splice(i, 1);
            renderUI();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('cart-hidden');
            document.getElementById('cart-overlay').classList.toggle('hidden');
        }

        function processCheckout() {
            if (cart.length === 0) return;
            document.getElementById('order-modal').classList.remove('hidden');
            cart = [];
            renderUI();
            toggleCart();
        }

        function closeOrderModal() {
            document.getElementById('order-modal').classList.add('hidden');
        }

        fetchProducts();
    </script>
</body>
</html>
